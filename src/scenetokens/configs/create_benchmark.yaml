# @package _global_
defaults:
  - benchmark: causal_agents  # override via benchmark=ego_safeshift or benchmark=environments
  - _self_

# General parameters shared across all benchmarks.
seed: 42
num_workers: 8

# Path to the input dataset (contains split subdirectories with .pkl scenario files).
input_data_path: /data/driving/waymo/processed/mini_causal/

# Root output directory for the benchmark.
output_data_path: /data/driving/waymo/processed/${benchmark_name}/

task_name: create_benchmark
